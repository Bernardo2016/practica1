version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.x
    commands:
      - pip install boto3
  build:
    commands:
      # Dar permisos de ejecución al script bash
      - chmod +x crear_registros.sh
      # Ejecutar el script bash
      - ./crear_registros.sh
      # (Opcional) Luego puedes ejecutar tu script de validación
      - python validar_registros.py
